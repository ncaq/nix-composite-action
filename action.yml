name: Nix Composite
author: ncaq
description: Install Nix and configure caches (Cachix, niks3)

branding:
  icon: "package"
  color: "purple"

inputs:
  extra-nix-config:
    description: Append nix.conf settings
    required: false
    default: ""
  cachix-name:
    description: Cachix cache name
    required: false
    default: ncaq
  cachix-auth-token:
    description: Cachix authentication token
    required: false
    default: ""
  niks3-endpoint:
    description: niks3 server endpoint URL
    required: false
    default: "https://niks3-public.ncaq.net"

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      with:
        # セルフホストランナーでうっかり外部からの悪意あるPRを実行許可してしまい、
        # そのまま`flake.nix`の設定を受け入れるとリスクが比較的高いため、
        # リスク軽減のためにGitHubホステッドランナーでのみ、
        # `flake.nix`の設定を自動で受け入れるようにしています。
        # GitHubホステッドランナーは荒らされても比較的安全なので受け入れるようにしています。
        # GitHubホステッドランナーでは`runner.environment`は`github-hosted`になります。
        # 仮に値が`github-hosted`にならなくてもキャッシュリストが読み込まれないだけなので、
        # リスクはありません。
        extra_nix_config: |
          ${{ runner.environment == 'github-hosted' && 'accept-flake-config = true' || '' }}
          ${{ inputs.extra-nix-config }}

    - name: Setup Cachix cache
      if: inputs.cachix-name != '' && inputs.cachix-auth-token != ''
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: "${{ inputs.cachix-name }}"
        authToken: "${{ inputs.cachix-auth-token }}"
        # フォークからのPRはキャッシュへのプッシュをスキップ。
        skipPush: ${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository }}
        # セルフホステッドランナーでは、
        # デーモンの`post-build-hook`ではなく、
        # store scanによるクライアント側pushを使用します。
        # セルフホステッドランナーではデーモンモードは簡単には動かないからです。
        # `post-build-hook`のパスがデーモンから到達できなかったりする問題があります。
        # 私のホストしているNixOSコンテナや、
        # 他の場所のUbuntu上のセルフホステッドランナーで、
        # daemonモードを無効化しないと動作しないことを確認しています。
        # store scanモードはクライアント側で単純な差分計算で動作するため、
        # 両環境で問題なく使えます。
        # しかしデーモンモードの方が一般的に効率が良いため、
        # GitHubホステッドランナーではデフォルトの挙動であるデーモンモードを使用します。
        useDaemon: ${{ runner.environment == 'github-hosted' }}

    # OIDC認証を使うのでsecretは不要です。
    # セルフホステッドランナーで`trusted-users`に含まれない場合は、
    # `post-build-hook`ではなく`/nix/store`のスキャンによるpushに自動でフォールバックします。
    - name: Setup niks3 cache
      uses: Mic92/niks3-action@bc010bf9dbc79ec59de6c79b1e7a167977d3978b # v1.0.0
      with:
        server-url: "${{ inputs.niks3-endpoint }}"
        # フォークからのPRはキャッシュへのプッシュをスキップ。
        skip-push: ${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository }}
