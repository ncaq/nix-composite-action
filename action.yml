name: Nix Composite
author: ncaq
description: Install Nix and push store paths to niks3

branding:
  icon: "package"
  color: "purple"

inputs:
  free-disk-space:
    description: >-
      Free up disk space by removing pre-installed software on GitHub-hosted Ubuntu runners.
      Enables only the high-ROI options (fast removals of large directories).
      The slow apt-based large-packages and the risky tool-cache options are kept disabled.
      Has no effect on self-hosted or non-Linux runners.
    required: false
    default: "true"
  extra-nix-config:
    description: Append nix.conf settings
    required: false
    default: ""
  niks3-endpoint:
    description: niks3 server endpoint URL
    required: false
    default: "https://niks3-public.ncaq.net"

runs:
  using: composite
  steps:
    # 空き容量を増やすため、
    # Nixをインストールする前に不要なプリインストールソフトウェアを削除します。
    # GitHubホステッドのLinuxランナーでのみ実行します。
    # 費用対効果の観点から、
    # 高速かつ大容量を解放できて、
    # Nixなどによって、
    # どうせ使わないであろうパッケージを消すオプションのみ有効化します。
    - name: Free disk space
      if: >-
        inputs.free-disk-space == 'true' &&
        runner.os == 'Linux' &&
        runner.environment == 'github-hosted'
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        android: true
        docker-images: false
        dotnet: true
        haskell: true
        large-packages: false
        swap-storage: false
        tool-cache: false

    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      with:
        # セルフホストランナーでうっかり外部からの悪意あるPRを実行許可してしまい、
        # そのまま`flake.nix`の設定を受け入れるとリスクが比較的高いため、
        # リスク軽減のためにGitHubホステッドランナーでのみ、
        # `flake.nix`の設定を自動で受け入れるようにしています。
        # GitHubホステッドランナーは荒らされても比較的安全なので受け入れるようにしています。
        # GitHubホステッドランナーでは`runner.environment`は`github-hosted`になります。
        # 仮に値が`github-hosted`にならなくてもキャッシュリストが読み込まれないだけなので、
        # リスクはありません。
        extra_nix_config: |
          ${{ runner.environment == 'github-hosted' && 'accept-flake-config = true' || '' }}
          ${{ inputs.extra-nix-config }}

    # OIDC認証を使うのでsecretは不要です。
    # セルフホステッドランナーで`trusted-users`に含まれない場合は、
    # `post-build-hook`ではなく`/nix/store`のスキャンによるpushに自動でフォールバックします。
    - name: Setup niks3 cache
      uses: Mic92/niks3-action@5e2abb3cfc970ffe49a117bc761bca8eefadd17f # v1.0.3
      with:
        server-url: "${{ inputs.niks3-endpoint }}"
        # フォークからのPRはキャッシュへのプッシュをスキップ。
        skip-push: ${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository }}
